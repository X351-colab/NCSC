<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie科普微课</title>
    <!-- 👇 新增ICO图标代码（浏览器标签页显示）👇 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f9f9f9;
        }
        h1 {
            margin-bottom: 40px;
            color: #333;
            font-size: 24px;
            text-align: center;
        }
        .btn {
            display: block;
            width: 280px;
            padding: 18px 0;
            margin: 15px 0;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            /* 手机点击去除高亮 */
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #3367d6;
        }
        /* 手机端按钮适配 */
        @media (max-width: 400px) {
            .btn {
                width: 100%;
                padding: 15px 0;
                font-size: 16px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>Cookie科普微课</h1>
    <button class="btn" onclick="goExercise()" ontouchstart="goExercise()">课后习题</button>
    <button class="btn" onclick="goExtension()" ontouchstart="goExtension()">拓展知识</button>

    <script>
        // 跳转函数，单独抽离更稳定
        function goExercise() {
            window.location.href = 'exercise.html';
        }
        function goExtension() {
            window.location.href = 'extension.html';
        }
    </script>
</body>
</html>
